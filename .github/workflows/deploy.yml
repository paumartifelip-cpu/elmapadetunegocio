name: Desplegar en GitHub Pages

on:
  # Publica cada vez que se hace push a main
  push:
    branches: [main]
  # Permite lanzarlo a mano desde la pestaña Actions
  workflow_dispatch:

# Permisos que necesita la Action para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Activa GitHub Pages con origen "GitHub Actions" si aún no lo está
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
